<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pedidos - Panel de Administración</title>
    <link rel="stylesheet" href="/src/styles/admin.css" />
    <link rel="stylesheet" href="/src/styles/orders.css" />
    <script type="module" src="./orders.ts"></script>
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="admin-sidebar-logo">
          <img src="/assets/logo.svg" alt="Food Store Logo" />
        </div>
        <nav>
          <ul>
            <li><a href="../home/home.html">Dashboard</a></li>
            <li><a href="../categories/categories.html">Categorías</a></li>
            <li><a href="../products/products.html">Productos</a></li>
            <li><a href="./orders.html" class="active">Pedidos</a></li>
            <li><a href="../../client/client.html">Ver Tienda</a></li>
          </ul>
        </nav>
      </aside>

      <div class="admin-content">
        <header class="admin-header">
          <h1>Gestión de Pedidos</h1>
          <div>
            <span id="userEmail"></span>
            <button id="logoutBtn" class="btn-logout">Cerrar sesión</button>
          </div>
        </header>

        <select id="filtroEstado" class="filtro-estado">
          <option value="">Todos los estados</option>
          <option value="PENDIENTE">Pendiente</option>
          <option value="EN_PREPARACION">En preparación</option>
          <option value="ENTREGADO">Entregado</option>
          <option value="CANCELADO">Cancelado</option>
        </select>

        <div id="pedidos-container"></div>
      </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" style="display:none;">
      <div class="modal">
        <button id="cerrarModal" class="modal-cerrar">&times;</button>
        <div id="modal-contenido"></div>
      </div>
    </div>
  </body>
</html>
