<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel de Administración</title>
    <link rel="stylesheet" href="/src/styles/admin.css" />
    <script type="module" src="./home.ts"></script>
  </head>

  <body>
   <header>
  <h1>&#128736; Panel de Administración</h1>

  <div>
    <span id="userEmail"></span>
    <button id="logoutBtn" class="btn-logout">Cerrar sesión</button>
  </div>
</header>

    <hr />

    <main>
      <section>
        <h2>Gestión de Productos</h2>
        <button>+ Agregar Nuevo Producto</button>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Imagen</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="tabla-productos"></tbody>
        </table>
      </section>

      <hr />

      <section>
        <details>
          <summary>&#128203; Agregar Producto Rápido</summary>

          <form id="form-producto">
            <label for="nombre">Nombre del Producto:</label>
            <input type="text" id="nombre" required />

            <label for="precio">Precio:</label>
            <input type="number" id="precio" required />

            <label for="stock">Stock Inicial:</label>
            <input type="number" id="stock" required />

            <label for="categoria">Categoría:</label>
            <select id="categoria" required>
              <option value="">Seleccione una opción...</option>
              <option value="Hamburguesas">Hamburguesas</option>
              <option value="Pizzas">Pizzas</option>
              <option value="Papas Fritas">Papas Fritas</option>
              <option value="Bebidas">Bebidas</option>
              <option value="Panchos">Panchos</option>
            </select>

            <label for="descripcion">Descripción:</label>
            <textarea
              id="descripcion"
              placeholder="Ingrese una descripción para el producto..."
            ></textarea>

            <button type="submit">Guardar Producto</button>
          </form>
        </details>
      </section>

    </main>

    <footer>
      <hr />
      <p>Panel de Administración - Food Store</p>
    </footer>
  </body>
</html>
