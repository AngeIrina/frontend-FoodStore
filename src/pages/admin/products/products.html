<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos - Panel de Administración</title>
    <link rel="stylesheet" href="/src/styles/admin.css" />
    <script type="module" src="./products.ts"></script>
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <div class="admin-sidebar-logo">
          <img src="/assets/logo.svg" alt="Food Store Logo" />
        </div>
        <nav>
          <ul>
            <li><a href="../home/home.html">Dashboard</a></li>
            <li><a href="../categories/categories.html">Categorías</a></li>
            <li><a href="./products.html" class="active">Productos</a></li>
            <li><a href="../orders/orders.html">Pedidos</a></li>
            <li><a href="../../client/client.html">Ver Tienda</a></li>
          </ul>
        </nav>
      </aside>

      <div class="admin-content">
        <header class="admin-header">
          <h1>Gestión de Productos</h1>
          <div>
            <span id="userEmail"></span>
            <button id="logoutBtn" class="btn-logout">Cerrar sesión</button>
          </div>
        </header>

        <button id="btnNuevo" class="btn-nuevo">+ Nuevo producto</button>

        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Imagen</th>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-productos"></tbody>
        </table>
      </div>
    </div>

    <div id="modal-overlay" class="modal-overlay" style="display:none;">
      <div class="modal">
        <button id="cerrarModal" class="modal-cerrar">&times;</button>
        <h2 id="modalTitulo">Nuevo producto</h2>
        <form id="formProducto">
          <div class="input-box">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" required />
          </div>
          <div class="input-box">
            <label for="descripcion">Descripción:</label>
            <textarea id="descripcion" rows="2" required></textarea>
          </div>
          <div class="input-box">
            <label for="precio">Precio:</label>
            <input type="number" id="precio" min="1" step="0.01" required />
          </div>
          <div class="input-box">
            <label for="stock">Stock:</label>
            <input type="number" id="stock" min="0" required />
          </div>
          <div class="input-box">
            <label for="categoria">Categoría:</label>
            <select id="categoria" required></select>
          </div>
          <div class="input-box">
            <label for="imagen">Imagen (URL):</label>
            <input type="text" id="imagen" />
          </div>
          <div class="input-box">
            <label for="disponible">Disponible:</label>
            <select id="disponible">
              <option value="true">Sí</option>
              <option value="false">No</option>
            </select>
          </div>
          <button type="submit" class="btn-nuevo">Guardar</button>
        </form>
      </div>
    </div>
  </body>
</html>
