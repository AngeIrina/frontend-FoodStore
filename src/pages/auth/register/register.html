<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Food Store</title>
    <link rel="stylesheet" href="/src/styles/register.css" />
    <script type="module" src="./register.ts"></script>
  </head>
  <body>
    <div class="card">
      <h1>Food Store</h1>
      <h2>Crear cuenta</h2>

      <form id="registerForm">
        <div class="input-box">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" placeholder="Tu nombre" required />
        </div>

        <div class="input-box">
          <label for="email">Email:</label>
          <input
            type="email"
            id="email"
            placeholder="tucorreo@ejemplo.com"
            required
          />
        </div>

        <div class="input-box">
          <label for="password">Contraseña:</label>
          <input
            type="password"
            id="password"
            placeholder="Mínimo 8 caracteres"
            required
          />
        </div>

        <button type="submit" class="btn-registrar">Registrarse</button>

        <p class="login-link">
          ¿Ya tenés cuenta?
          <a href="../login/login.html">Iniciá sesión</a>
        </p>
      </form>
    </div>
  </body>
</html>
